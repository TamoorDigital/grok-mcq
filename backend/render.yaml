services:
  - type: web
    name: grok-mcq-backend
    env: python

    buildCommand: |
      apt-get update
      apt-get install -y tesseract-ocr tesseract-ocr-eng
      pip install -r requirements.txt

    startCommand: gunicorn app:app --timeout 180 --workers 1 --worker-class sync --keep-alive 5

    envVars:
      - key: HF_API_KEY
        sync: false